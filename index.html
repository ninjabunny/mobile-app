<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=375, initial-scale=1" />
  <title>Payment details</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #fff;
      font-family: 'Inter', sans-serif;
    }

    .phone {
      width: 100%;
      min-height: 100vh;
      background: #fff;
    }

    /* ── Status bar ── */
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px 6px;
      font-size: 13px;
      font-weight: 600;
      color: #111;
    }

    .status-right {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
    }

    .battery {
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .battery-box {
      width: 26px;
      height: 14px;
      border: 1.5px solid #111;
      border-radius: 3px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 2px;
    }

    .battery-box::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 2.5px;
      height: 6px;
      background: #111;
      border-radius: 0 1px 1px 0;
    }

    .battery-fill {
      height: 100%;
      width: 80%;
      background: #111;
      border-radius: 1px;
    }

    /* ── Nav bar ── */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 8px 20px 12px;
      gap: 10px;
    }

    .back-arrow {
      font-size: 22px;
      font-weight: 300;
      color: #111;
      line-height: 1;
      padding-right: 4px;
      flex-shrink: 0;
    }

    .search-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      border: 1.5px solid #ddd;
      border-radius: 100px;
      padding: 7px 8px 7px 12px;
    }

    .search-pill svg.search-icon {
      width: 15px;
      height: 15px;
      color: #aaa;
      flex-shrink: 0;
    }

    .search-pill span {
      font-size: 14px;
      font-weight: 400;
      color: #aaa;
      flex: 1;
    }

    .zelle-icon {
      width: 30px;
      height: 30px;
      background: #6930C3;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .zelle-icon svg {
      width: 18px;
      height: 18px;
      fill: #fff;
    }

    .bell-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .bell-wrap svg {
      width: 24px;
      height: 24px;
      color: #111;
    }

    .badge {
      position: absolute;
      top: -5px;
      right: -6px;
      background: #e03030;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sign-off {
      font-size: 14px;
      font-weight: 400;
      color: #111;
      flex-shrink: 0;
    }

    /* ── Page title ── */
    .page-title {
      font-size: 30px;
      font-weight: 300;
      color: #111;
      padding: 8px 20px 24px;
      line-height: 1.15;
    }

    /* ── Hero section ── */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 20px 32px;
      text-align: center;
    }

    .icon-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #f0eef8;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .icon-circle svg {
      width: 34px;
      height: 34px;
    }

    #amount:focus { outline: none; border-bottom: 2px solid #6930C3; }

    .amount {
      font-size: 46px;
      font-weight: 300;
      color: #111;
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 10px;
    }

    .sent-to-label {
      font-size: 14px;
      font-weight: 400;
      color: #888;
      margin-bottom: 3px;
    }

    .recipient-name {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      margin-bottom: 2px;
    }

    .recipient-email {
      font-size: 14px;
      font-weight: 300;
      color: #888;
      margin-bottom: 6px;
    }

    .status-completed {
      font-size: 16px;
      font-weight: 700;
      color: #111;
    }

    /* ── Detail rows ── */
    .details {
      padding: 16px 20px 0;
    }

    .detail-row {
      padding: 14px 0;
    }

    .detail-label {
      font-size: 15px;
      font-weight: 700;
      color: #111;
      margin-bottom: 3px;
    }

    .detail-value {
      font-size: 15px;
      font-weight: 400;
      color: #111;
    }

    /* ── Block link ── */
    .block-link {
      text-align: center;
      padding: 28px 20px 24px;
      font-size: 16px;
      font-weight: 400;
      color: #6930C3;
      cursor: pointer;
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      border-top: 1px solid #e5e5e5;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 10px 0 20px;
      background: #fff;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }

    .nav-item .nav-label {
      font-size: 11px;
      font-weight: 400;
      color: #333;
    }

    .nav-item.active .nav-label {
      font-weight: 700;
      color: #111;
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon svg {
      width: 26px;
      height: 26px;
    }

    /* Pay & Transfer active pill */
    .nav-icon.pay-icon {
      width: 40px;
      height: 40px;
      background: #D0021B;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav-icon.pay-icon svg {
      width: 22px;
      height: 22px;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- Status bar -->
  <div class="status-bar">
    <span id="status-time"></span>
    <div class="status-right">
      <span>5G<sup style="font-size:8px">W</sup></span>
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#111">
        <rect x="0" y="7" width="3" height="5" rx="0.5"/>
        <rect x="4" y="5" width="3" height="7" rx="0.5"/>
        <rect x="8" y="2.5" width="3" height="9.5" rx="0.5"/>
        <rect x="12" y="0" width="3" height="12" rx="0.5"/>
      </svg>
      <div class="battery">
        <span>89</span>
        <div class="battery-box"><div class="battery-fill"></div></div>
      </div>
    </div>
  </div>

  <!-- Nav bar -->
  <div class="nav-bar">
    <span class="back-arrow">&#8249;</span>

    <div class="search-pill">
      <!-- Search icon -->
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="#aaa" stroke-width="2">
        <circle cx="8.5" cy="8.5" r="5.5"/>
        <line x1="13" y1="13" x2="18" y2="18"/>
      </svg>
      <span>Need help?</span>
      <!-- Zelle-like chat icon -->
      <div class="zelle-icon">
        <svg viewBox="0 0 24 24"><path d="M20 2H4C2.9 2 2 2.9 2 4v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
    </div>

    <!-- Bell -->
    <div class="bell-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="1.8">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
      <div class="badge">4</div>
    </div>

    <span class="sign-off">Sign off</span>
  </div>

  <!-- Page title -->
  <div class="page-title">Payment details</div>

  <!-- Hero -->
  <div class="hero">
    <div class="icon-circle">
      <!-- Briefcase icon -->
      <svg viewBox="0 0 34 34" fill="none" stroke="#6930C3" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="12" width="28" height="18" rx="2"/>
        <path d="M23 12V9a3 3 0 0 0-3-3h-6a3 3 0 0 0-3 3v3"/>
        <line x1="3" y1="21" x2="31" y2="21"/>
        <line x1="14" y1="21" x2="14" y2="25"/>
        <line x1="20" y1="21" x2="20" y2="25"/>
        <line x1="14" y1="25" x2="20" y2="25"/>
      </svg>
    </div>

    <div class="amount">$<span id="amount" contenteditable="true" spellcheck="false" inputmode="numeric">87.06</span></div>
    <div class="sent-to-label">Sent to</div>
    <div class="recipient-name">ELLEJUN INC</div>
    <div class="recipient-email">lokmichelle@yahoo.com</div>
    <div class="status-completed">Completed</div>
  </div>

  <!-- Detail rows -->
  <div class="details">
    <div class="detail-row">
      <div class="detail-label">Sent on</div>
      <div class="detail-value" id="sent-date"></div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Pay from</div>
      <div class="detail-value">EVERYDAY CHECKING ...2790</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Memo</div>
      <div class="detail-value">food</div>
    </div>
    <div class="detail-row">
      <div class="detail-label">Confirmation</div>
      <div class="detail-value" id="confirmation"></div>
    </div>
  </div>

  <!-- Block link -->
  <div class="block-link">Block ELLEJUN INC &rsaquo;</div>

  <!-- Bottom nav -->
  <div class="bottom-nav">

    <!-- Accounts -->
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 26 26" fill="none" stroke="#333" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 11L13 3l10 8v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V11z"/>
          <path d="M9 24V13h8v11"/>
        </svg>
      </div>
      <span class="nav-label">Accounts</span>
    </div>

    <!-- Deposit -->
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 26 26" fill="none" stroke="#333" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="10" width="20" height="13" rx="1.5"/>
          <line x1="7" y1="14" x2="14" y2="14"/>
          <line x1="7" y1="18" x2="11" y2="18"/>
          <line x1="13" y1="3" x2="13" y2="10"/>
          <polyline points="9,7 13,3 17,7"/>
        </svg>
      </div>
      <span class="nav-label">Deposit</span>
    </div>

    <!-- Pay & Transfer (active) -->
    <div class="nav-item active">
      <div class="nav-icon pay-icon">
        <svg viewBox="0 0 22 22" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <!-- speed lines -->
          <line x1="2" y1="8" x2="7" y2="8" stroke="#fff" stroke-width="1.8"/>
          <line x1="2" y1="11" x2="6" y2="11" stroke="#fff" stroke-width="1.8"/>
          <line x1="2" y1="14" x2="7" y2="14" stroke="#fff" stroke-width="1.8"/>
          <!-- dollar circle -->
          <circle cx="14" cy="11" r="6" stroke="#fff" stroke-width="1.8"/>
          <path d="M14 7.5v7M12 9.5c0-.8.9-1.5 2-1.5s2 .7 2 1.5-.9 1-2 1-2 .7-2 1.5.9 1.5 2 1.5 2-.7 2-1.5" stroke="#fff" stroke-width="1.4"/>
        </svg>
      </div>
      <span class="nav-label">Pay & Transfer</span>
    </div>

    <!-- Explore -->
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 26 26" fill="none" stroke="#333" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="13" cy="13" r="10"/>
          <polygon points="18,8 15,15 8,18 11,11" fill="#333" stroke="none"/>
          <circle cx="13" cy="13" r="1.2" fill="#fff" stroke="none"/>
        </svg>
      </div>
      <span class="nav-label">Explore</span>
    </div>

    <!-- Menu -->
    <div class="nav-item">
      <div class="nav-icon">
        <svg viewBox="0 0 26 26" fill="none" stroke="#333" stroke-width="1.8" stroke-linecap="round">
          <line x1="4" y1="8" x2="22" y2="8"/>
          <line x1="4" y1="13" x2="22" y2="13"/>
          <line x1="4" y1="18" x2="22" y2="18"/>
        </svg>
      </div>
      <span class="nav-label">Menu</span>
    </div>

  </div>

</div>
<script>
  function updateTime() {
    const now = new Date();
    const h = now.getHours() % 12 || 12;
    const m = String(now.getMinutes()).padStart(2, '0');
    document.getElementById('status-time').textContent = `${h}:${m}`;
  }
  updateTime();
  setInterval(updateTime, 1000);

  // Currency input: digits only, last 2 are cents
  let digits = '8706';
  const amountEl = document.getElementById('amount');

  function renderAmount() {
    const padded = digits.padStart(3, '0');
    const dollars = padded.slice(0, -2).replace(/^0+/, '') || '0';
    const cents = padded.slice(-2);
    amountEl.textContent = `${dollars}.${cents}`;
  }

  amountEl.addEventListener('keydown', (e) => {
    if (e.key >= '0' && e.key <= '9') {
      e.preventDefault();
      if (digits.length < 10) digits += e.key;
      renderAmount();
    } else if (e.key === 'Backspace') {
      e.preventDefault();
      digits = digits.slice(0, -1);
      renderAmount();
    } else if (!['ArrowLeft','ArrowRight','Tab'].includes(e.key)) {
      e.preventDefault();
    }
  });

  amountEl.addEventListener('paste', (e) => e.preventDefault());

  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  const segments = [4, 3, 1, 2, 1, 1];
  const code = segments.map(len =>
    Array.from({length: len}, () => chars[Math.floor(Math.random() * chars.length)]).join('')
  ).join('');
  document.getElementById('confirmation').textContent = code;

  const d = new Date();
  const mm = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  const yyyy = d.getFullYear();
  document.getElementById('sent-date').textContent = `${mm}/${dd}/${yyyy}`;
</script>
</body>
</html>
